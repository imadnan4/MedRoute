version: "3.9"

services:
  medroute:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/app/data/chroma
    env_file:
      - .env
    environment:
      - MEDROUTE_USE_MOCK_ASR=true
      - MEDROUTE_USE_MOCK_LLM=true
      - MEDROUTE_CHROMA_PATH=/app/data/chroma
    restart: unless-stopped